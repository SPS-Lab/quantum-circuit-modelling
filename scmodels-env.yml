name: scmodels-env

channels:
  - conda-forge

dependencies:
  # Core Python
  - python=3.11

  # Numerical stack
  - numpy
  - scipy

  # Quantum toolkits (model + simulation layers)
  - qutip
  - scqubits

  # Jupyter kernel support
  - ipykernel

  # Utilities
  - matplotlib
  - sympy

  # Python type checker
  - pyright

  # For storing data
  - h5py

  # To run tests
  - pytest
